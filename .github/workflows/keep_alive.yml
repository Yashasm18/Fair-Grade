name: Keep Backend Alive

on:
  schedule:
    # Ping every 14 minutes — just under Render's 15-min inactivity sleep window.
    # Previous */10 cadence burned through free-tier Actions minutes too quickly.
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger

# Cancel any in-progress or queued runs of this workflow when a new one starts.
# Prevents stale pings from piling up and wasting Actions minutes.
concurrency:
  group: keep-alive
  cancel-in-progress: true

permissions: {}          # least-privilege — this job needs no repo access

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5    # fail fast if runner is slow or unavailable
    steps:
      - name: Wake up backend
        # Render free-tier cold starts can take up to ~50 s.
        # --max-time 70 gives ample headroom; || true ensures this
        # keep-alive ping never marks the workflow as failed.
        run: |
          echo "Pinging https://fairgrade-backend.onrender.com/ ..."
          for attempt in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 \
              https://fairgrade-backend.onrender.com/ || echo "000")
            echo "Attempt $attempt — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is online"
              exit 0
            fi
            echo "⏳ Not yet ready, waiting 5 s before retry..."
            sleep 5
          done
          echo "⚠️ Backend did not return 200 after 3 attempts — may still be waking up"
        # Never fail the workflow — this is a fire-and-forget keep-alive
        continue-on-error: true
